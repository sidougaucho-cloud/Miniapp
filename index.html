<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini App Telegram</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1c1c1c;
border-radius:20px;
padding:15px;
margin-bottom:20px;
}

img{
width:100%;
border-radius:15px;
}

.price{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-top:15px;
background:#2ea6ff;
color:white;
}

</style>
</head>

<body>

<h1>🛒 Mon Shop Telegram</h1>

<div class="card">

<img src="https://picsum.photos/400/300">

<h2>Produit Premium</h2>

<p class="price">50€</p>

<button onclick="buyProduct()">
Acheter
</button>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

function buyProduct(){
alert("Commande envoyée !");
}

</script>

</body>
