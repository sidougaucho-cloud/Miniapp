<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram Shop</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

h1{
text-align:center;
margin-bottom:30px;
}

.products{
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#1c1c1c;
border-radius:20px;
overflow:hidden;
padding:15px;
}

.card img{
width:100%;
border-radius:15px;
}

.card h2{
margin-top:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
margin-top:15px;
background:#2ea6ff;
color:white;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

.modal-content{
background:#1c1c1c;
padding:20px;
border-radius:20px;
width:100%;
max-width:400px;
}

.close{
float:right;
font-size:24px;
cursor:pointer;
}

.price-option{
background:#2a2a2a;
padding:12px;
border-radius:12px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>🛒 Mon Shop</h1>

<div class="products" id="products"></div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">
✖
</span>

<div id="modalContent"></div>

</div>

</div>

<script>

const SHEET_ID =
"10c14iXOEwEOEl6OvH9irEvMsF6gCasuVjU26Rn-XsmU";

const URL =
`https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

fetch(URL)
.then(res => res.json())
.then(data => {

const products =
document.getElementById("products");

data.forEach(product => {

products.innerHTML += `

<div class="card">

<img src="${product.image}">

<h2>${product.nom}</h2>

<button onclick='showProduct(
"${product.nom}",
"${product.image}",
"${product.description}",
"${product.prix5g}",
"${product.prix10g}",
"${product.prix20g}"
)'>
Voir produit
</button>

</div>

`;

});

});

function showProduct(
nom,
image,
description,
prix5g,
prix10g,
prix20g
){

document.getElementById("modal").style.display = "flex";

document.getElementById("modalContent").innerHTML = `

<img src="${image}"
style="width:100%;border-radius:15px;">

<h2>${nom}</h2>

<p>${description}</p>

<div class="price-option">
5G : ${prix5g}
</div>

<div class="price-option">
10G : ${prix10g}
</div>

<div class="price-option">
20G : ${prix20g}
</div>

<button>
Ajouter au panier
</button>

`;

}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
