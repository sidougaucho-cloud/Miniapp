<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram Shop</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1c1c1c;
border-radius:20px;
padding:15px;
margin-bottom:20px;
}

img{
width:100%;
border-radius:15px;
}

.price{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-top:15px;
background:#2ea6ff;
color:white;
}

</style>

</head>

<body>

<h1>🛒 Mon Shop</h1>

<div id="products"></div>

<script>

const SHEET_ID = "10c14iXOEwEOEl6OvH9irEvMsF6gCasuVjU26Rn-XsmU";

const URL =
`https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

fetch(URL)
.then(res => res.json())
.then(data => {

const container =
document.getElementById("products");

data.forEach(product => {

container.innerHTML += `

<div class="card">

<img src="${product.image}">

<h2>${product.nom}</h2>

<p class="price">${product.prix}</p>

<button>
Acheter
</button>

</div>

`;

});

});

</script>

</body>
</html>
